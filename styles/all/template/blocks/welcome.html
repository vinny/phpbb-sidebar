<!-- IF S_USER_LOGGED_IN -->
	<div class="vinny-welcome-container">
		<div class="sidebar-avatar vinny-avatar-container">
			<!-- IF SIDEBAR_USER_AVATAR -->
				{SIDEBAR_USER_AVATAR}
			<!-- ELSE -->
				<img src="{T_THEME_PATH}/images/no_avatar.gif" alt="{L_USER_AVATAR}" class="avatar" />
			<!-- ENDIF -->
		</div>
		<div class="sidebar-greeting">
			<span class="vinny-welcome-back">{L_SIDEBAR_WELCOME_BACK}</span>
			<span class="vinny-welcome-name"><strong>{SIDEBAR_USER_FULL}</strong>!</span>
		</div>
	</div>

	<ul class="vinny-sidebar-list vinny-welcome-list">
		<li class="vinny-sidebar-list-item">
			<a href="{U_USER_PROFILE}" class="vinny-sidebar-list-link"><i class="icon fa-user fa-fw" aria-hidden="true"></i> {L_READ_PROFILE}</a>
		</li>
		<li class="vinny-sidebar-list-item">
			<a href="{U_PROFILE}" class="vinny-sidebar-list-link"><i class="icon fa-sliders fa-fw" aria-hidden="true"></i> {L_PROFILE}</a>
		</li>
		<li class="vinny-sidebar-list-item">
			<a href="{U_PRIVATEMSGS}" class="vinny-sidebar-list-link">
				<i class="icon fa-envelope fa-fw" aria-hidden="true"></i> {L_PRIVATE_MESSAGES}
				<!-- IF PRIVATE_MESSAGE_COUNT > 0 -->
					<strong class="vinny-pm-count">({PRIVATE_MESSAGE_COUNT})</strong>
				<!-- ENDIF -->
			</a>
		</li>
		<li class="vinny-sidebar-list-item">
			<a href="{U_LOGIN_LOGOUT}" class="vinny-sidebar-list-link"><i class="icon fa-power-off fa-fw" aria-hidden="true"></i> {L_LOGOUT}</a>
		</li>
	</ul>
<!-- ELSE -->
	<div class="vinny-guest-msg">
		{L_SIDEBAR_WELCOME_GUEST}{L_COLON}
	</div>
	<form action="{S_LOGIN_ACTION}" method="post">
		<fieldset class="vinny-login-fieldset">
			<input type="text" tabindex="1" name="username" id="username" size="25" class="inputbox autowidth vinny-login-input" placeholder="{L_USERNAME}" />
			<input type="password" tabindex="2" id="password" name="password" size="25" class="inputbox autowidth vinny-login-input" placeholder="{L_PASSWORD}" autocomplete="off" />
			
			<!-- IF S_AUTOLOGIN_ENABLED -->
				<label for="autologin" class="vinny-autologin-label">
					<input type="checkbox" name="autologin" id="autologin" tabindex="3" /> {L_LOG_ME_IN}
				</label>
			<!-- ENDIF -->
			
			<input type="submit" name="login" tabindex="5" value="{L_LOGIN}" class="button1 vinny-login-btn" />
			{S_LOGIN_REDIRECT}
			{S_FORM_TOKEN_LOGIN}
		</fieldset>
	</form>
	
	<!-- IF S_REGISTER_ENABLED -->
		<div class="vinny-register-container">
			<a href="{U_REGISTER}" class="vinny-register-link">{L_REGISTER}</a>
		</div>
	<!-- ENDIF -->
<!-- ENDIF -->
